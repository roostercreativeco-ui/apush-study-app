<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APUSH Quiz Mode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --bg-card: #121829;
            --accent-blue: #4f8cff;
            --accent-red: #ff4f4f;
            --accent-gold: #ffc845;
            --accent-green: #34d399;
            --text-main: #f0f2ff;
            --text-dim: #8892b0;
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(79, 140, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79, 140, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
        }
        .bg-glow.blue { background: var(--accent-blue); top: -200px; right: -100px; }
        .bg-glow.red { background: var(--accent-red); bottom: -300px; left: -200px; opacity: 0.2; }

        .nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .nav-logo { font-weight: 800; font-size: 1.1rem; color: var(--text-main); text-decoration: none; }
        .nav-logo span { color: var(--accent-blue); }
        .nav-back { color: var(--text-dim); text-decoration: none; font-size: 0.9rem; font-weight: 600; transition: color 0.2s; }
        .nav-back:hover { color: var(--accent-blue); }

        .container {
            position: relative;
            z-index: 1;
            max-width: 520px;
            margin: 0 auto;
            padding: 80px 24px 40px;
            min-height: 100vh;
        }

        .period-selector { margin-bottom: 28px; }
        .period-selector label { font-size: 0.9rem; font-weight: 600; color: var(--text-dim); display: block; margin-bottom: 10px; }
        .period-pills { display: flex; flex-wrap: wrap; gap: 8px; }
        .period-pill {
            padding: 8px 16px; border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent; color: var(--text-dim);
            font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .period-pill:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .period-pill.active { background: var(--accent-blue); border-color: var(--accent-blue); color: white; }
        .period-pill.bookmark-pill {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }
        .period-pill.bookmark-pill:hover {
            background: rgba(255, 200, 69, 0.1);
        }
        .period-pill.bookmark-pill.active {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
            color: #0a0e1a;
        }

        .quiz-setup { text-align: center; margin-top: 20px; }
        .quiz-setup p { color: var(--text-dim); margin-bottom: 20px; font-size: 0.95rem; }
        .question-count { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 24px; }
        .question-count label { color: var(--text-dim); font-size: 0.9rem; font-weight: 600; }
        .question-count select {
            padding: 10px 16px; border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--bg-card); color: var(--text-main);
            font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 600;
            cursor: pointer; outline: none;
        }
        .btn-start {
            padding: 16px 40px;
            background: linear-gradient(135deg, var(--accent-blue), #6c63ff);
            color: white; font-family: 'Outfit', sans-serif; font-size: 1.1rem; font-weight: 700;
            border: none; border-radius: 14px; cursor: pointer; transition: all 0.2s;
        }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(79,140,255,0.3); }

        .history-section { margin-top: 36px; text-align: left; }
        .history-title { font-size: 0.9rem; font-weight: 700; color: var(--text-dim); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .history-list { display: flex; flex-direction: column; gap: 8px; }
        .history-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; background: var(--bg-card); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; }
        .history-left { display: flex; flex-direction: column; gap: 2px; }
        .history-period { font-size: 0.8rem; font-weight: 600; color: var(--accent-gold); }
        .history-date { font-size: 0.75rem; color: var(--text-dim); }
        .history-score { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700; }

        /* PROGRESS BAR */
        .progress-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .progress-track { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 100px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent-blue), var(--accent-green)); border-radius: 100px; transition: width 0.4s ease; }
        .progress-text { font-family: 'Space Mono', monospace; font-size: 0.8rem; color: var(--text-dim); white-space: nowrap; }

        .score-strip { display: flex; justify-content: center; gap: 20px; margin-bottom: 24px; font-family: 'Space Mono', monospace; font-size: 0.85rem; }
        .score-correct { color: var(--accent-green); }
        .score-wrong { color: var(--accent-red); }

        /* QUESTION CARD — with bookmark row */
        .question-card {
            background: var(--bg-card);
            border: 1px solid rgba(79, 140, 255, 0.1);
            border-radius: var(--radius);
            padding: 28px 24px 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .question-card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .question-card .period-tag {
            font-size: 0.75rem; font-weight: 600; color: var(--accent-gold);
            background: rgba(255, 200, 69, 0.1);
            padding: 4px 12px; border-radius: 100px;
            display: inline-block;
        }
        .question-card .question-text { font-size: 1.05rem; font-weight: 600; line-height: 1.5; margin-bottom: 16px; }

        /* BOOKMARK BUTTON */
        .bookmark-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.12);
            background: transparent;
            color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
            margin-left: 12px;
        }
        .bookmark-btn:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }
        .bookmark-btn.bookmarked {
            background: rgba(255, 200, 69, 0.12);
            border-color: var(--accent-gold);
            color: var(--accent-gold);
        }
        .bookmark-btn .bk-star { font-size: 1rem; line-height: 1; }

        /* BOOKMARK TOAST */
        .bookmark-toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--bg-card);
            border: 1px solid var(--accent-gold);
            color: var(--accent-gold);
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 700;
            z-index: 999;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .bookmark-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .choices { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

        .choice-btn {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .choice-btn:hover:not(.disabled) {
            border-color: var(--accent-blue);
            background: rgba(79, 140, 255, 0.06);
        }
        .choice-btn .letter {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-dim);
            flex-shrink: 0;
        }
        .choice-body { display: flex; flex-direction: column; gap: 0; padding-top: 4px; flex: 1; }
        .choice-text { line-height: 1.4; }

        .wrong-reason {
            display: none;
            margin-top: 8px;
            padding: 7px 10px;
            background: rgba(255, 79, 79, 0.07);
            border-left: 3px solid rgba(255, 79, 79, 0.5);
            border-radius: 0 6px 6px 0;
            font-size: 0.81rem;
            line-height: 1.45;
            color: #ff9999;
            font-weight: 500;
        }
        .wrong-reason.visible { display: block; animation: fadeInReason 0.3s ease; }
        .choice-btn.correct .wrong-reason { display: none !important; }

        @keyframes fadeInReason {
            from { opacity: 0; transform: translateY(-3px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .choice-btn.correct { border-color: var(--accent-green); background: rgba(52, 211, 153, 0.08); }
        .choice-btn.correct .letter { background: var(--accent-green); color: var(--bg-dark); }
        .choice-btn.wrong { border-color: var(--accent-red); background: rgba(255, 79, 79, 0.08); }
        .choice-btn.wrong .letter { background: var(--accent-red); color: white; }
        .choice-btn.dimmed { opacity: 0.45; }
        .choice-btn.disabled { cursor: default; pointer-events: none; }

        .explanation-box {
            display: none;
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .explanation-box.show { display: block; }
        .explanation-box.is-correct { background: rgba(52, 211, 153, 0.08); border: 1px solid rgba(52, 211, 153, 0.2); }
        .explanation-box.is-wrong   { background: rgba(255, 79, 79, 0.08);  border: 1px solid rgba(255, 79, 79, 0.2); }
        .explanation-box .result-label { font-weight: 700; font-size: 1rem; margin-bottom: 8px; }
        .explanation-box.is-correct .result-label { color: var(--accent-green); }
        .explanation-box.is-wrong   .result-label { color: var(--accent-red); }
        .explanation-box .result-text { color: var(--text-dim); }

        .btn-next-q {
            display: none;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-blue), #6c63ff);
            color: white; font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700;
            border: none; border-radius: 14px; cursor: pointer; transition: all 0.2s;
        }
        .btn-next-q.show { display: block; }
        .btn-next-q:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(79,140,255,0.3); }

        .results { display: none; text-align: center; padding: 20px 0; }
        .results-emoji { font-size: 4rem; margin-bottom: 16px; }
        .results h2 { font-size: 1.8rem; font-weight: 900; margin-bottom: 8px; }
        .results .results-subtitle { color: var(--text-dim); font-size: 1rem; margin-bottom: 32px; }
        .results-score-card { background: var(--bg-card); border: 1px solid rgba(79,140,255,0.1); border-radius: var(--radius); padding: 28px; margin-bottom: 28px; }
        .results-big-score { font-family: 'Space Mono', monospace; font-size: 3rem; font-weight: 700; margin-bottom: 8px; }
        .results-big-score .score-num { color: var(--accent-green); }
        .results-big-score .score-den { color: var(--text-dim); }
        .results-pct { font-size: 1.2rem; font-weight: 700; margin-bottom: 16px; }
        .results-bar { height: 10px; background: rgba(255,255,255,0.08); border-radius: 100px; overflow: hidden; margin-bottom: 16px; }
        .results-bar-fill { height: 100%; border-radius: 100px; transition: width 1s ease; }
        .results-stats { display: flex; justify-content: center; gap: 32px; font-size: 0.9rem; }
        .results-stats .stat-correct { color: var(--accent-green); }
        .results-stats .stat-wrong { color: var(--accent-red); }
        .results-stats span { font-weight: 700; }
        .weakest-period {
            margin-top: 14px;
            padding: 12px 16px;
            background: rgba(255, 200, 69, 0.07);
            border: 1px solid rgba(255, 200, 69, 0.2);
            border-radius: 12px;
            font-size: 0.88rem;
            color: var(--accent-gold);
            line-height: 1.5;
        }
        .weakest-period strong { display: block; font-size: 0.95rem; margin-bottom: 2px; }
        .saved-badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 16px; padding: 6px 14px; background: rgba(52, 211, 153, 0.1); border: 1px solid rgba(52, 211, 153, 0.2); border-radius: 100px; font-size: 0.8rem; color: var(--accent-green); }
        .xp-badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 8px; padding: 6px 14px; background: rgba(255,200,69,0.1); border: 1px solid rgba(255,200,69,0.25); border-radius: 100px; font-size: 0.85rem; font-weight: 700; color: var(--accent-gold); animation: xp-pop 0.4s ease; }
        @keyframes xp-pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .results-actions { display: flex; gap: 12px; justify-content: center; }
        .btn-retry { padding: 14px 28px; background: linear-gradient(135deg, var(--accent-blue), #6c63ff); color: white; font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700; border: none; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .btn-retry:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(79,140,255,0.3); }
        .btn-home { padding: 14px 28px; background: transparent; border: 1px solid rgba(255,255,255,0.15); color: var(--text-dim); font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700; border-radius: 12px; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; }
        .btn-home:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

        .loading { text-align: center; padding: 80px 20px; }
        .loading .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { color: var(--text-dim); }

        @media (max-width: 480px) {
            .container { padding: 72px 18px 32px; }
            .question-card { padding: 22px 18px 16px; }
            .choice-btn { padding: 14px 14px; font-size: 0.9rem; }
            .results-big-score { font-size: 2.4rem; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow blue"></div>
    <div class="bg-glow red"></div>

    <!-- Bookmark toast notification -->
    <div class="bookmark-toast" id="bookmark-toast"></div>

    <nav class="nav">
        <a href="index.html" class="nav-logo">🇺🇸 <span>APUSH</span></a>
        <a href="index.html" class="nav-back">← Back</a>
    </nav>

    <div class="container">

        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading questions...</p>
        </div>

        <div id="setup-screen" style="display:none;">
            <div class="period-selector">
                <label>Choose a period:</label>
                <div class="period-pills" id="period-pills">
                    <button class="period-pill active" data-period="all">All</button>
                    <button class="period-pill" data-period="1">1</button>
                    <button class="period-pill" data-period="2">2</button>
                    <button class="period-pill" data-period="3">3</button>
                    <button class="period-pill" data-period="4">4</button>
                    <button class="period-pill" data-period="5">5</button>
                    <button class="period-pill" data-period="6">6</button>
                    <button class="period-pill" data-period="7">7</button>
                    <button class="period-pill" data-period="8">8</button>
                    <button class="period-pill" data-period="9">9</button>
                    <button class="period-pill bookmark-pill" data-period="bookmarks" id="bookmarks-pill" style="display:none;">⭐ Saved</button>
                </div>
            </div>

            <div class="quiz-setup">
                <p id="available-count">110 questions available</p>
                <div class="question-count">
                    <label for="num-questions">Questions:</label>
                    <select id="num-questions">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                        <option value="all">All</option>
                    </select>
                </div>
                <button class="btn-start" onclick="startQuiz()">🎯 Start Quiz</button>
            </div>

            <div class="history-section" id="history-section" style="display:none;">
                <div class="history-title">📊 Recent Scores</div>
                <div class="history-list" id="history-list"></div>
            </div>
        </div>

        <div id="quiz-screen" style="display:none;">
            <div class="progress-bar">
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
                </div>
                <span class="progress-text" id="progress-text">1 / 10</span>
            </div>

            <div class="score-strip">
                <span class="score-correct">✓ <span id="score-correct">0</span></span>
                <span class="score-wrong">✗ <span id="score-wrong">0</span></span>
            </div>

            <div class="question-card">
                <div class="question-card-top">
                    <span class="period-tag" id="q-period">Period 3</span>
                    <button class="bookmark-btn" id="bookmark-btn" onclick="toggleBookmark()">
                        <span class="bk-star">☆</span>
                        <span class="bk-label">Save</span>
                    </button>
                </div>
                <div class="question-text" id="q-text"></div>
            </div>

            <div class="choices" id="choices"></div>

            <div class="explanation-box" id="explanation-box">
                <div class="result-label" id="result-label"></div>
                <div class="result-text" id="result-text"></div>
            </div>

            <button class="btn-next-q" id="btn-next-q" onclick="nextQuestion()">Next Question →</button>
        </div>

        <div class="results" id="results-screen">
            <div class="results-emoji" id="results-emoji">🎉</div>
            <h2 id="results-title">Great Job!</h2>
            <p class="results-subtitle" id="results-subtitle">Here's how you did</p>

            <div class="results-score-card">
                <div class="results-big-score">
                    <span class="score-num" id="final-correct">0</span><span class="score-den" id="final-total"> / 10</span>
                </div>
                <div class="results-pct" id="final-pct" style="color: var(--accent-green);">100%</div>
                <div class="results-bar">
                    <div class="results-bar-fill" id="results-bar-fill" style="width:0%"></div>
                </div>
                <div class="results-stats">
                    <div class="stat-correct">✓ Correct: <span id="final-correct-2">0</span></div>
                    <div class="stat-wrong">✗ Wrong: <span id="final-wrong">0</span></div>
                </div>
                <div class="saved-badge" id="saved-badge" style="display:none;">✓ Score saved</div>
                <div class="xp-badge" id="xp-badge" style="display:none;"></div>
                <div class="weakest-period" id="weakest-period" style="display:none;"></div>
            </div>

            <div class="results-actions">
                <button class="btn-retry" onclick="retryQuiz()">🔄 Try Again</button>
                <a href="index.html" class="btn-home">🏠 Home</a>
            </div>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBSGb5RS3Nl0vVTYgJ_mhL2MKyon8pdxIg",
            authDomain: "apush-study-app.firebaseapp.com",
            projectId: "apush-study-app",
            storageBucket: "apush-study-app.firebasestorage.app",
            messagingSenderId: "542394166242",
            appId: "1:542394166242:web:a25342b1cba5af5c3267bb",
            measurementId: "G-3DNWBLPPC3"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let currentUser = null;

        // ========================
        // BOOKMARKS (in-memory + Firestore)
        // ========================
        let bookmarkedIds = new Set(); // set of question id strings

        async function loadBookmarks() {
            if (!currentUser) return;
            try {
                var snap = await db.collection('users').doc(currentUser.uid)
                    .collection('bookmarks').get();
                bookmarkedIds = new Set();
                snap.forEach(function(doc) { bookmarkedIds.add(doc.id); });
                updateBookmarksPill();
            } catch(e) { console.log('Could not load bookmarks:', e); }
        }

        async function toggleBookmark() {
            var q = quizQuestions[currentIndex];
            if (!q) return;
            var qid = String(q.id);
            var btn = document.getElementById('bookmark-btn');

            if (bookmarkedIds.has(qid)) {
                // Remove bookmark
                bookmarkedIds.delete(qid);
                btn.classList.remove('bookmarked');
                btn.querySelector('.bk-star').textContent = '☆';
                btn.querySelector('.bk-label').textContent = 'Save';
                showToast('Removed ✕');
                if (currentUser) {
                    try { await db.collection('users').doc(currentUser.uid).collection('bookmarks').doc(qid).delete(); } catch(e) {}
                }
            } else {
                // Add bookmark
                bookmarkedIds.add(qid);
                btn.classList.add('bookmarked');
                btn.querySelector('.bk-star').textContent = '⭐';
                btn.querySelector('.bk-label').textContent = 'Saved!';
                showToast('⭐ Saved!');
                if (currentUser) {
                    try {
                        await db.collection('users').doc(currentUser.uid).collection('bookmarks').doc(qid).set({
                            questionId: qid,
                            period: q.period,
                            savedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    } catch(e) {}
                }
            }
            updateBookmarksPill();
        }

        function updateBookmarkBtn(q) {
            var btn = document.getElementById('bookmark-btn');
            var isBookmarked = bookmarkedIds.has(String(q.id));
            if (isBookmarked) {
                btn.classList.add('bookmarked');
                btn.querySelector('.bk-star').textContent = '⭐';
                btn.querySelector('.bk-label').textContent = 'Saved!';
            } else {
                btn.classList.remove('bookmarked');
                btn.querySelector('.bk-star').textContent = '☆';
                btn.querySelector('.bk-label').textContent = 'Save';
            }
        }

        function updateBookmarksPill() {
            var pill = document.getElementById('bookmarks-pill');
            if (bookmarkedIds.size > 0) {
                pill.style.display = 'inline-flex';
                pill.textContent = '⭐ Saved (' + bookmarkedIds.size + ')';
            } else {
                pill.style.display = 'none';
                // If currently viewing bookmarks and all removed, switch to all
                if (currentPeriod === 'bookmarks') {
                    currentPeriod = 'all';
                    filteredQuestions = [...allQuestions];
                    updateAvailableCount();
                    document.querySelectorAll('.period-pill').forEach(function(p) { p.classList.remove('active'); });
                    document.querySelector('[data-period="all"]').classList.add('active');
                }
            }
        }

        let toastTimer = null;
        function showToast(msg) {
            var toast = document.getElementById('bookmark-toast');
            toast.textContent = msg;
            toast.classList.add('show');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(function() { toast.classList.remove('show'); }, 1800);
        }

        // ========================
        // AUTH
        // ========================
        auth.onAuthStateChanged(function(user) {
            currentUser = user;
            if (user) {
                loadHistory();
                loadBookmarks();
            }
        });

        // ========================
        // SAVE SCORE
        // ========================
        // XP helpers
        function calcLevel(xp) {
            if (xp < 500)  return { level: 1, title: 'Recruit',   next: 500  };
            if (xp < 1000) return { level: 2, title: 'Scholar',   next: 1000 };
            if (xp < 2000) return { level: 3, title: 'Historian', next: 2000 };
            if (xp < 4000) return { level: 4, title: 'Expert',    next: 4000 };
            return              { level: 5, title: 'Master',    next: null };
        }

        async function saveScore(correct, total, period, pct) {
            if (!currentUser) return;
            try {
                await db.collection('users').doc(currentUser.uid)
                    .collection('quizScores').add({
                        correct, total, percent: pct, period,
                        date: firebase.firestore.FieldValue.serverTimestamp()
                    });

                // XP: 10 per correct + 20 completion bonus
                var xpEarned = (correct * 10) + 20;

                var userRef = db.collection('users').doc(currentUser.uid);
                var userDoc = await userRef.get();
                var newXP, newName;
                if (userDoc.exists) {
                    var data = userDoc.data();
                    newXP = (data.xp || 0) + xpEarned;
                    newName = data.name || currentUser.displayName || currentUser.email.split('@')[0];
                    await userRef.update({
                        totalQuizzes:  (data.totalQuizzes  || 0) + 1,
                        totalCorrect:  (data.totalCorrect  || 0) + correct,
                        totalAnswered: (data.totalAnswered || 0) + total,
                        xp: newXP,
                        level: calcLevel(newXP).level,
                        lastActive: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    newXP = xpEarned;
                    newName = currentUser.displayName || currentUser.email.split('@')[0];
                    await userRef.set({
                        name: newName, email: currentUser.email,
                        totalQuizzes: 1, totalCorrect: correct, totalAnswered: total,
                        xp: newXP, level: 1,
                        lastActive: firebase.firestore.FieldValue.serverTimestamp(),
                        joined: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }

                // Update public leaderboard
                await db.collection('leaderboard').doc(currentUser.uid).set({
                    name: newName, xp: newXP,
                    level: calcLevel(newXP).level,
                    levelTitle: calcLevel(newXP).title,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                document.getElementById('saved-badge').style.display = 'inline-flex';
                var xpEl = document.getElementById('xp-badge');
                xpEl.textContent = '+' + xpEarned + ' XP ⚡';
                xpEl.style.display = 'inline-flex';
            } catch(e) { console.log('Could not save score:', e); }
        }

        // ========================
        // LOAD HISTORY
        // ========================
        async function loadHistory() {
            if (!currentUser) return;
            try {
                var snap = await db.collection('users').doc(currentUser.uid)
                    .collection('quizScores').orderBy('date','desc').limit(5).get();
                if (snap.empty) { document.getElementById('history-section').style.display = 'none'; return; }
                var html = '';
                snap.forEach(function(doc) {
                    var d = doc.data();
                    var dateStr = d.date ? d.date.toDate().toLocaleDateString('en-US',{month:'short',day:'numeric'}) : 'Just now';
                    var periodLabel = d.period === 'all' ? 'All Periods' : d.period === 'bookmarks' ? '⭐ Saved' : 'Period ' + d.period;
                    var color = d.percent >= 80 ? 'var(--accent-green)' : d.percent >= 60 ? 'var(--accent-gold)' : 'var(--accent-red)';
                    html += '<div class="history-item"><div class="history-left"><span class="history-period">' + periodLabel + '</span><span class="history-date">' + dateStr + '</span></div><span class="history-score" style="color:' + color + '">' + d.correct + '/' + d.total + ' (' + d.percent + '%)</span></div>';
                });
                document.getElementById('history-list').innerHTML = html;
                document.getElementById('history-section').style.display = 'block';
            } catch(e) { console.log('Could not load history:', e); }
        }

        // ========================
        // QUESTION LOADING
        // ========================
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS27sGvM2_qbgIzYu0DUexvyoBvmYFtPJurozjPJ-lOkdu87UQFnqGJBvhIiirbqiVSHcUEHRtx7bBw/pub?gid=562015740&single=true&output=csv";

        let allQuestions = [], filteredQuestions = [], quizQuestions = [];
        let currentIndex = 0, correctCount = 0, wrongCount = 0;
        let answered = false, currentPeriod = "all";
        let wrongByPeriod = {};

        async function loadQuestions() {
            try {
                const text = await (await fetch(SHEET_URL)).text();
                const rows = parseCSV(text);
                allQuestions = rows.slice(1).map(function(row) {
                    return {
                        id: row[0], period: row[1], type: row[2],
                        question: row[3],
                        choiceA: row[4], choiceB: row[5], choiceC: row[6], choiceD: row[7],
                        correct: row[8], explanation: row[9],
                        explainA: row[10] || '', explainB: row[11] || '',
                        explainC: row[12] || '', explainD: row[13] || ''
                    };
                }).filter(function(q) { return q.question && q.question.trim() !== ''; });

                filteredQuestions = [...allQuestions];
                updateAvailableCount();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('setup-screen').style.display = 'block';
            } catch(e) {
                document.getElementById('loading').innerHTML = '<p style="color:var(--accent-red);">Failed to load questions. Please refresh.</p>';
            }
        }

        function parseCSV(text) {
            const rows = []; let row = [], field = '', inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const char = text[i], next = text[i+1];
                if (inQuotes) {
                    if (char === '"' && next === '"') { field += '"'; i++; }
                    else if (char === '"') { inQuotes = false; }
                    else { field += char; }
                } else {
                    if (char === '"') { inQuotes = true; }
                    else if (char === ',') { row.push(field.trim()); field = ''; }
                    else if (char === '\n' || (char === '\r' && next === '\n')) {
                        row.push(field.trim());
                        if (row.length > 1) rows.push(row);
                        row = []; field = '';
                        if (char === '\r') i++;
                    } else { field += char; }
                }
            }
            if (field || row.length > 0) { row.push(field.trim()); if (row.length > 1) rows.push(row); }
            return rows;
        }

        // ========================
        // PERIOD SELECTION
        // ========================
        document.querySelectorAll('.period-pill').forEach(function(pill) {
            pill.addEventListener('click', function() {
                currentPeriod = this.dataset.period;
                document.querySelectorAll('.period-pill').forEach(function(p) { p.classList.remove('active'); });
                this.classList.add('active');

                if (currentPeriod === 'all') {
                    filteredQuestions = [...allQuestions];
                } else if (currentPeriod === 'bookmarks') {
                    filteredQuestions = allQuestions.filter(function(q) { return bookmarkedIds.has(String(q.id)); });
                } else {
                    filteredQuestions = allQuestions.filter(function(q) { return q.period === currentPeriod; });
                }
                updateAvailableCount();
            });
        });

        function updateAvailableCount() {
            var count = filteredQuestions.length;
            var label = currentPeriod === 'bookmarks' ? count + ' saved questions' : count + ' questions available';
            document.getElementById('available-count').textContent = label;
        }

        // ========================
        // START QUIZ
        // ========================
        function startQuiz() {
            if (filteredQuestions.length === 0) return;
            var numSelect = document.getElementById('num-questions').value;
            var shuffled = [...filteredQuestions];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            quizQuestions = numSelect === "all" ? shuffled : shuffled.slice(0, Math.min(parseInt(numSelect), shuffled.length));
            currentIndex = 0; correctCount = 0; wrongCount = 0; wrongByPeriod = {};
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('results-screen').style.display = 'none';
            showQuestion();
        }

        // ========================
        // SHOW QUESTION
        // ========================
        function showQuestion() {
            answered = false;
            var q = quizQuestions[currentIndex];

            document.getElementById('progress-fill').style.width = ((currentIndex / quizQuestions.length) * 100) + '%';
            document.getElementById('progress-text').textContent = (currentIndex + 1) + ' / ' + quizQuestions.length;
            document.getElementById('score-correct').textContent = correctCount;
            document.getElementById('score-wrong').textContent = wrongCount;
            document.getElementById('q-period').textContent = 'Period ' + q.period;
            document.getElementById('q-text').textContent = q.question;

            // Set bookmark button state
            updateBookmarkBtn(q);

            var choices = [
                { letter: 'A', text: q.choiceA, explain: q.explainA },
                { letter: 'B', text: q.choiceB, explain: q.explainB },
                { letter: 'C', text: q.choiceC, explain: q.explainC },
                { letter: 'D', text: q.choiceD, explain: q.explainD }
            ];

            var html = '';
            choices.forEach(function(c) {
                var explain = escapeAttr(c.explain || '');
                html +=
                    '<button class="choice-btn" data-letter="' + c.letter + '" data-explain="' + explain + '" onclick="selectAnswer(\'' + c.letter + '\')">' +
                        '<div class="letter">' + c.letter + '</div>' +
                        '<div class="choice-body">' +
                            '<div class="choice-text">' + c.text + '</div>' +
                            '<div class="wrong-reason" id="reason-' + c.letter + '"></div>' +
                        '</div>' +
                    '</button>';
            });

            document.getElementById('choices').innerHTML = html;
            document.getElementById('explanation-box').className = 'explanation-box';
            document.getElementById('btn-next-q').className = 'btn-next-q';
        }

        function escapeAttr(str) {
            return str.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        // ========================
        // SELECT ANSWER
        // ========================
        function selectAnswer(letter) {
            if (answered) return;
            answered = true;

            var q = quizQuestions[currentIndex];
            var isCorrect = letter === q.correct;

            if (isCorrect) { correctCount++; document.getElementById('score-correct').textContent = correctCount; }
            else {
                wrongCount++; document.getElementById('score-wrong').textContent = wrongCount;
                var wp = q.period || 'unknown';
                wrongByPeriod[wp] = (wrongByPeriod[wp] || 0) + 1;
            }

            document.querySelectorAll('.choice-btn').forEach(function(btn) {
                btn.classList.add('disabled');
                var btnLetter = btn.dataset.letter;
                var explain = btn.dataset.explain || '';

                if (btnLetter === q.correct) {
                    btn.classList.add('correct');
                } else if (btnLetter === letter && !isCorrect) {
                    btn.classList.add('wrong');
                    if (explain) {
                        var el = document.getElementById('reason-' + btnLetter);
                        if (el) { el.textContent = explain; el.classList.add('visible'); }
                    }
                } else {
                    btn.classList.add('dimmed');
                    if (explain) {
                        var el = document.getElementById('reason-' + btnLetter);
                        if (el) { el.textContent = explain; el.classList.add('visible'); }
                    }
                }
            });

            var expBox = document.getElementById('explanation-box');
            expBox.className = 'explanation-box show ' + (isCorrect ? 'is-correct' : 'is-wrong');
            document.getElementById('result-label').textContent = isCorrect ? '✓ Correct!' : '✗ Incorrect';
            document.getElementById('result-text').textContent = q.explanation;

            var isLast = currentIndex >= quizQuestions.length - 1;
            var nextBtn = document.getElementById('btn-next-q');
            nextBtn.textContent = isLast ? 'See Results →' : 'Next Question →';
            nextBtn.className = 'btn-next-q show';

            setTimeout(function() { expBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
        }

        // ========================
        // NEXT QUESTION
        // ========================
        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= quizQuestions.length) { showResults(); }
            else { showQuestion(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
        }


        // ========================
        // WEAKEST PERIOD
        // ========================
        function showWeakestPeriod() {
            var el = document.getElementById('weakest-period');
            if (!el) return;

            // Find period with most wrong answers
            var periods = Object.keys(wrongByPeriod);
            if (periods.length === 0) {
                el.style.display = 'none';
                return;
            }

            var weakest = periods.reduce(function(a, b) {
                return wrongByPeriod[a] >= wrongByPeriod[b] ? a : b;
            });

            var periodNames = {
                '1': 'Period 1 — Pre-Columbian & Exploration',
                '2': 'Period 2 — Colonial America',
                '3': 'Period 3 — Revolution & Early Republic',
                '4': 'Period 4 — Expansion & Reform',
                '5': 'Period 5 — Civil War & Reconstruction',
                '6': 'Period 6 — Gilded Age',
                '7': 'Period 7 — Progressivism through WWII',
                '8': 'Period 8 — Cold War & Civil Rights',
                '9': 'Period 9 — Modern America'
            };

            var name = periodNames[weakest] || ('Period ' + weakest);
            var count = wrongByPeriod[weakest];
            el.innerHTML = '<strong>📉 Weakest area: ' + name + '</strong>You missed ' + count + ' question' + (count > 1 ? 's' : '') + ' here — quiz that period next!';
            el.style.display = 'block';
        }

        // ========================
        // RESULTS
        // ========================
        function showResults() {
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('results-screen').style.display = 'block';

            var total = quizQuestions.length;
            var pct = Math.round((correctCount / total) * 100);

            document.getElementById('final-correct').textContent   = correctCount;
            document.getElementById('final-total').textContent     = ' / ' + total;
            document.getElementById('final-correct-2').textContent = correctCount;
            document.getElementById('final-wrong').textContent     = wrongCount;
            document.getElementById('final-pct').textContent       = pct + '%';
            document.getElementById('saved-badge').style.display   = 'none';

            var pctEl = document.getElementById('final-pct');
            pctEl.style.color = pct >= 80 ? 'var(--accent-green)' : pct >= 60 ? 'var(--accent-gold)' : 'var(--accent-red)';

            var barFill = document.getElementById('results-bar-fill');
            barFill.style.background = pct >= 80
                ? 'linear-gradient(90deg, var(--accent-green), #34d399)'
                : pct >= 60
                    ? 'linear-gradient(90deg, var(--accent-gold), #ffc845)'
                    : 'linear-gradient(90deg, var(--accent-red), #ff6b6b)';
            setTimeout(function() { barFill.style.width = pct + '%'; }, 100);

            var emoji, title, subtitle;
            if      (pct === 100) { emoji='🏆'; title='Perfect Score!';  subtitle="You're ready for the exam!"; }
            else if (pct >= 80)   { emoji='🔥'; title='Great Job!';      subtitle='You really know your history!'; }
            else if (pct >= 60)   { emoji='💪'; title='Not Bad!';        subtitle="Keep studying and you'll crush it!"; }
            else if (pct >= 40)   { emoji='📚'; title='Keep Going!';     subtitle='Review the flashcards and try again!'; }
            else                  { emoji='😤'; title='Time to Study!';  subtitle='Hit the flashcards and come back stronger!'; }

            document.getElementById('results-emoji').textContent    = emoji;
            document.getElementById('results-title').textContent    = title;
            document.getElementById('results-subtitle').textContent = subtitle;

            showWeakestPeriod();
            saveScore(correctCount, total, currentPeriod, pct);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ========================
        // RETRY
        // ========================
        function retryQuiz() {
            document.getElementById('results-screen').style.display = 'none';
            document.getElementById('results-bar-fill').style.width = '0%';
            document.getElementById('setup-screen').style.display = 'block';
            loadHistory();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // ========================
        // KEYBOARD SHORTCUTS
        // ========================
        document.addEventListener('keydown', function(e) {
            if (!answered) {
                if (e.key==='1'||e.key==='a'||e.key==='A') selectAnswer('A');
                else if (e.key==='2'||e.key==='b'||e.key==='B') selectAnswer('B');
                else if (e.key==='3'||e.key==='c'||e.key==='C') selectAnswer('C');
                else if (e.key==='4'||e.key==='d'||e.key==='D') selectAnswer('D');
            } else {
                if (e.key==='Enter'||e.key===' ') { e.preventDefault(); nextQuestion(); }
            }
        });

        loadQuestions();
    </script>
</body>
</html>
