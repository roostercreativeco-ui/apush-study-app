<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APUSH Quiz Mode</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --bg-card: #121829;
            --accent-blue: #4f8cff;
            --accent-red: #ff4f4f;
            --accent-gold: #ffc845;
            --accent-green: #34d399;
            --text-main: #f0f2ff;
            --text-dim: #8892b0;
            --radius: 16px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(79, 140, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(79, 140, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
        }
        .bg-glow.blue { background: var(--accent-blue); top: -200px; right: -100px; }
        .bg-glow.red { background: var(--accent-red); bottom: -300px; left: -200px; opacity: 0.2; }

        /* NAV */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 24px;
            background: rgba(10, 14, 26, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .nav-logo {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text-main);
            text-decoration: none;
        }
        .nav-logo span { color: var(--accent-blue); }
        .nav-back {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            transition: color 0.2s;
        }
        .nav-back:hover { color: var(--accent-blue); }

        /* CONTAINER */
        .container {
            position: relative;
            z-index: 1;
            max-width: 520px;
            margin: 0 auto;
            padding: 80px 24px 40px;
            min-height: 100vh;
        }

        /* PERIOD SELECTOR */
        .period-selector {
            margin-bottom: 28px;
        }
        .period-selector label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dim);
            display: block;
            margin-bottom: 10px;
        }
        .period-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .period-pill {
            padding: 8px 16px;
            border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .period-pill:hover { border-color: var(--accent-blue); color: var(--accent-blue); }
        .period-pill.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        /* QUIZ SETUP */
        .quiz-setup {
            text-align: center;
            margin-top: 20px;
        }
        .quiz-setup p {
            color: var(--text-dim);
            margin-bottom: 20px;
            font-size: 0.95rem;
        }
        .question-count {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 24px;
        }
        .question-count label {
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 600;
        }
        .question-count select {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--bg-card);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }
        .btn-start {
            padding: 16px 40px;
            background: linear-gradient(135deg, var(--accent-blue), #6c63ff);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(79,140,255,0.3); }
        .btn-start:active { transform: translateY(0); }

        /* PROGRESS BAR */
        .progress-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .progress-track {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.08);
            border-radius: 100px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-green));
            border-radius: 100px;
            transition: width 0.4s ease;
        }
        .progress-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-dim);
            white-space: nowrap;
        }

        /* SCORE STRIP */
        .score-strip {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 24px;
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
        }
        .score-correct { color: var(--accent-green); }
        .score-wrong { color: var(--accent-red); }

        /* QUESTION CARD */
        .question-card {
            background: var(--bg-card);
            border: 1px solid rgba(79, 140, 255, 0.1);
            border-radius: var(--radius);
            padding: 28px 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .question-card .period-tag {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent-gold);
            background: rgba(255, 200, 69, 0.1);
            padding: 4px 12px;
            border-radius: 100px;
            display: inline-block;
            margin-bottom: 16px;
        }
        .question-card .question-text {
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.5;
        }

        /* CHOICES */
        .choices {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .choice-btn {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 16px 18px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            line-height: 1.4;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
        }
        .choice-btn:hover:not(.disabled) {
            border-color: var(--accent-blue);
            background: rgba(79, 140, 255, 0.06);
        }
        .choice-btn .letter {
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--text-dim);
            flex-shrink: 0;
        }
        .choice-btn .choice-text {
            padding-top: 4px;
        }

        /* Choice states after answering */
        .choice-btn.correct {
            border-color: var(--accent-green);
            background: rgba(52, 211, 153, 0.08);
        }
        .choice-btn.correct .letter {
            background: var(--accent-green);
            color: var(--bg-dark);
        }
        .choice-btn.wrong {
            border-color: var(--accent-red);
            background: rgba(255, 79, 79, 0.08);
        }
        .choice-btn.wrong .letter {
            background: var(--accent-red);
            color: white;
        }
        .choice-btn.dimmed {
            opacity: 0.4;
        }
        .choice-btn.disabled {
            cursor: default;
            pointer-events: none;
        }

        /* EXPLANATION BOX */
        .explanation-box {
            display: none;
            padding: 20px;
            border-radius: 14px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        .explanation-box.show { display: block; }
        .explanation-box.is-correct {
            background: rgba(52, 211, 153, 0.08);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }
        .explanation-box.is-wrong {
            background: rgba(255, 79, 79, 0.08);
            border: 1px solid rgba(255, 79, 79, 0.2);
        }
        .explanation-box .result-label {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 8px;
        }
        .explanation-box.is-correct .result-label { color: var(--accent-green); }
        .explanation-box.is-wrong .result-label { color: var(--accent-red); }
        .explanation-box .result-text { color: var(--text-dim); }

        /* NEXT QUESTION BUTTON */
        .btn-next-q {
            display: none;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--accent-blue), #6c63ff);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-next-q.show { display: block; }
        .btn-next-q:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(79,140,255,0.3); }

        /* RESULTS SCREEN */
        .results {
            display: none;
            text-align: center;
            padding: 20px 0;
        }
        .results-emoji {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        .results h2 {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 8px;
        }
        .results .results-subtitle {
            color: var(--text-dim);
            font-size: 1rem;
            margin-bottom: 32px;
        }
        .results-score-card {
            background: var(--bg-card);
            border: 1px solid rgba(79,140,255,0.1);
            border-radius: var(--radius);
            padding: 28px;
            margin-bottom: 28px;
        }
        .results-big-score {
            font-family: 'Space Mono', monospace;
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .results-big-score .score-num { color: var(--accent-green); }
        .results-big-score .score-den { color: var(--text-dim); }
        .results-pct {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 16px;
        }
        .results-bar {
            height: 10px;
            background: rgba(255,255,255,0.08);
            border-radius: 100px;
            overflow: hidden;
            margin-bottom: 16px;
        }
        .results-bar-fill {
            height: 100%;
            border-radius: 100px;
            transition: width 1s ease;
        }
        .results-stats {
            display: flex;
            justify-content: center;
            gap: 32px;
            font-size: 0.9rem;
        }
        .results-stats .stat-correct { color: var(--accent-green); }
        .results-stats .stat-wrong { color: var(--accent-red); }
        .results-stats span { font-weight: 700; }

        .results-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .btn-retry {
            padding: 14px 28px;
            background: linear-gradient(135deg, var(--accent-blue), #6c63ff);
            color: white;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-retry:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(79,140,255,0.3); }
        .btn-home {
            padding: 14px 28px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--text-dim);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
        }
        .btn-home:hover { border-color: var(--accent-blue); color: var(--accent-blue); }

        /* LOADING */
        .loading {
            text-align: center;
            padding: 80px 20px;
        }
        .loading .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { color: var(--text-dim); }

        @media (max-width: 480px) {
            .container { padding: 72px 18px 32px; }
            .question-card { padding: 22px 18px; }
            .choice-btn { padding: 14px 14px; font-size: 0.9rem; }
            .results-big-score { font-size: 2.4rem; }
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow blue"></div>
    <div class="bg-glow red"></div>

    <nav class="nav">
        <a href="index.html" class="nav-logo">🇺🇸 <span>APUSH</span></a>
        <a href="index.html" class="nav-back">← Back</a>
    </nav>

    <div class="container">

        <!-- LOADING -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading questions...</p>
        </div>

        <!-- SETUP SCREEN -->
        <div id="setup-screen" style="display:none;">
            <div class="period-selector">
                <label>Choose a period:</label>
                <div class="period-pills" id="period-pills">
                    <button class="period-pill active" data-period="all">All</button>
                    <button class="period-pill" data-period="1">1</button>
                    <button class="period-pill" data-period="2">2</button>
                    <button class="period-pill" data-period="3">3</button>
                    <button class="period-pill" data-period="4">4</button>
                    <button class="period-pill" data-period="5">5</button>
                    <button class="period-pill" data-period="6">6</button>
                    <button class="period-pill" data-period="7">7</button>
                    <button class="period-pill" data-period="8">8</button>
                    <button class="period-pill" data-period="9">9</button>
                </div>
            </div>

            <div class="quiz-setup">
                <p id="available-count">110 questions available</p>
                <div class="question-count">
                    <label for="num-questions">Questions:</label>
                    <select id="num-questions">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="15">15</option>
                        <option value="20">20</option>
                        <option value="all">All</option>
                    </select>
                </div>
                <button class="btn-start" onclick="startQuiz()">🎯 Start Quiz</button>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="quiz-screen" style="display:none;">
            <div class="progress-bar">
                <div class="progress-track">
                    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
                </div>
                <span class="progress-text" id="progress-text">1 / 10</span>
            </div>

            <div class="score-strip">
                <span class="score-correct">✓ <span id="score-correct">0</span></span>
                <span class="score-wrong">✗ <span id="score-wrong">0</span></span>
            </div>

            <div class="question-card">
                <span class="period-tag" id="q-period">Period 3</span>
                <div class="question-text" id="q-text"></div>
            </div>

            <div class="choices" id="choices"></div>

            <div class="explanation-box" id="explanation-box">
                <div class="result-label" id="result-label"></div>
                <div class="result-text" id="result-text"></div>
            </div>

            <button class="btn-next-q" id="btn-next-q" onclick="nextQuestion()">Next Question →</button>
        </div>

        <!-- RESULTS SCREEN -->
        <div class="results" id="results-screen">
            <div class="results-emoji" id="results-emoji">🎉</div>
            <h2 id="results-title">Great Job!</h2>
            <p class="results-subtitle" id="results-subtitle">Here's how you did</p>

            <div class="results-score-card">
                <div class="results-big-score">
                    <span class="score-num" id="final-correct">0</span><span class="score-den" id="final-total"> / 10</span>
                </div>
                <div class="results-pct" id="final-pct" style="color: var(--accent-green);">100%</div>
                <div class="results-bar">
                    <div class="results-bar-fill" id="results-bar-fill" style="width:0%"></div>
                </div>
                <div class="results-stats">
                    <div class="stat-correct">✓ Correct: <span id="final-correct-2">0</span></div>
                    <div class="stat-wrong">✗ Wrong: <span id="final-wrong">0</span></div>
                </div>
            </div>

            <div class="results-actions">
                <button class="btn-retry" onclick="retryQuiz()">🔄 Try Again</button>
                <a href="index.html" class="btn-home">🏠 Home</a>
            </div>
        </div>

    </div>

    <script>
        const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS27sGvM2_qbgIzYu0DUexvyoBvmYFtPJurozjPJ-lOkdu87UQFnqGJBvhIiirbqiVSHcUEHRtx7bBw/pub?gid=919172279&single=true
